<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 12px; font-family: -apple-system, sans-serif; }
    .row { margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="row">
    <label>
      <input type="checkbox" id="enableToggle" /> Enable Auto-Sweep to Stale List
    </label>
  </div>
  <div class="row">
    <label for="daysInput">Days Inactive before sweeping:</label>
    <input type="number" id="daysInput" value="30" style="width: 60px;" />
  </div>
  <button id="saveBtn" class="mod-primary">Save Settings</button>

  <script>
    var t = window.TrelloPowerUp.iframe();

    // Load existing settings when opened
    t.render(function() {
      t.get('board', 'shared').then(function(data) {
        if (data) {
          document.getElementById('enableToggle').checked = data.sweepEnabled || false;
          document.getElementById('daysInput').value = data.sweepThreshold || 30;
        }
      });
    });

    // Save settings back to the board
    document.getElementById('saveBtn').addEventListener('click', function() {
      const isEnabled = document.getElementById('enableToggle').checked;
      const days = parseInt(document.getElementById('daysInput').value, 10);

      t.set('board', 'shared', {
        'sweepEnabled': isEnabled,
        'sweepThreshold': days
      }).then(function() {
        t.closePopup();
      });
    });
  </script>
</body>
</html>
